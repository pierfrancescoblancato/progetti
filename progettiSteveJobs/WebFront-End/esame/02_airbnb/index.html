<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Airbnb</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="brand">
        <div class="logo">
          <img src="assets/airbnb-icon.svg" alt="Airbnb Logo" />
        </div>
        <h2 class="title">Airbnb</h2>
      </div>
      <div class="options">
        <div class="search-bar">
          <input type="search" placeholder="Cerca destinazioni" />
        </div>

        <div class="buttons-container">
          <button>Alloggi</button>
          <button>Esperienze</button>
          <button>Servizi</button>
        </div>
      </div>
    </nav>

    <section class="scroll-card">
      <h1>Milano: alloggi popolari</h1>
      <div class="cards-wrapper">
        <div class="card">Card 1</div>
        <div class="card">Card 2</div>
        <div class="card">Card 3</div>
        <div class="card">Card 4</div>
        <div class="card">Card 5</div>
      </div>
    </section>
    <section class="scroll-card">
      <h1>Roma: disponibili il prossimo me</h1>
      <div class="cards-wrapper">
        <div class="card">Card 1</div>
        <div class="card">Card 2</div>
        <div class="card">Card 3</div>
        <div class="card">Card 4</div>
        <div class="card">Card 5</div>
      </div>
    </section>
    <section class="scroll-card">
      <h1>Parigi: hotel in evidenza</h1>
      <div class="cards-wrapper">
        <div class="card">Card 1</div>
        <div class="card">Card 2</div>
        <div class="card">Card 3</div>
        <div class="card">Card 4</div>
        <div class="card">Card 5</div>
      </div>
    </section>
  </body>
</html>
